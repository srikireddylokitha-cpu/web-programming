<!DOCTYPE html>
<html>
<head>

<title>Student Registration Portal</title>

<style>

body{
background:skyblue;
font-family:Arial;
}

h1{
text-align:center;
}

.section{
background:darkblue;
color:white;
padding:15px;
margin:20px;
border-radius:10px;
}

input{
display:block;
margin:10px 0;
padding:5px;
}

button{
padding:10px;
}

</style>

</head>

<body>
    <h1>M.Sai Suchith 24BCE0092</h1>
<h1>Student Registration Portal</h1>

<form>

<div class="section">

<h3>Personal Information</h3>

<input type="text" placeholder="Full Name">

<input type="date">

<input type="email" placeholder="Email">

<input type="text" placeholder="Mobile Number">

</div>

<div class="section">

<h3>Academic Details</h3>

<input type="text" placeholder="Register Number">

<input type="text" placeholder="Degree Program">

<input type="text" placeholder="Department">

<input type="text" placeholder="Year of Study">

</div>

<div class="section">

<h3>Address Information</h3>

<input type="text" placeholder="Door Number">

<input type="text" placeholder="Street Name">

<input type="text" placeholder="City">

<input type="text" placeholder="State">

<input type="text" placeholder="Pincode">

</div>

<div class="section">

<h3>Account Credentials</h3>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<button onclick="alert('Form Submitted Successfully')">Submit</button>

</div>

</form>

</body>
</html>
