<!DOCTYPE html>
<html>
<head>
    <title>Adding Images in HTML</title>
</head>
<body>
    <h1>LOKITHA SRIKIREDDY 24BCE0074</h1> <hr>
    <h1>Web Development Training Cell</h1>
    <p>This tutorial explains how to add images to a web page using different sources.</p>
    <ol>
        <li>
            <h3>Image from External Website (URL)</h3>
            <img src="https://via.placeholder.com/200"
                 alt="External Image"
                 width="200">
        </li>
        <li>
            <h3>Image from Local Computer</h3>
            <!-- Replace the path with your actual image path -->
            <img src="C:/Users/YourName/Pictures/sample.jpg"
                 alt="Local Computer Image"
                 width="200">
        </li>
        <li>
            <h3>Image from Project Folder</h3>
            <!-- Image stored inside project folder (example: images folder) -->
            <img src="images/sample.jpg"
                 alt="Project Folder Image"
                 width="200">
        </li>
    </ol>
</body>
</html>
